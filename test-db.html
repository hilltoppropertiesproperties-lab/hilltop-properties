<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New Supabase connection test</title>
</head>
<body>
  <h1>Real estate management database test</h1>
  <pre id="result">Checking configuration…</pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (async function () {
      var output = document.getElementById('result');
      var client = window.realEstateManagementSupabase;
      if (!client) {
        output.textContent = 'The new project is not configured in supabase-config.js.';
        return;
      }

      var result = await client
        .from('properties')
        .select('id, reference_number, status')
        .eq('status', 'Active');

      output.textContent = result.error
        ? 'Connection failed: ' + result.error.message
        : 'Connected to the new project. Active rentals: ' + result.data.length;
    }());
  </script>
</body>
</html>
